<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Admin Dashboard | CV Niaga Bersama Abadi</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/admin.css">
<link rel="stylesheet" href="css/admin-bikes.css">
<link rel="stylesheet" href="css/admin-brands.css">
<link rel="stylesheet" href="css/admin-invoices.css">
<link rel="stylesheet" href="css/admin-services.css">
<link rel="stylesheet" href="css/admin-users.css">
<link rel="stylesheet" href="css/admin-reports.css">
<link rel="stylesheet" href="css/admin-audit.css">
</head>

<body class="admin-body">
  <main class="admin-page" id="adminApp">
    <section class="admin-login-section" id="adminLoginSection">
      <div class="admin-login-card">
        <div class="admin-login-brand">
          <img
            src="images/logo.jpeg"
            alt="CV Niaga Bersama Abadi"
          >

          <div>
            <p class="admin-eyebrow">Admin Dashboard</p>
            <h1>CV Niaga Bersama Abadi</h1>
            <p>
              Login untuk mengelola katalog sepeda, brand, invoice, service,
              user, dan aktivitas.
            </p>
          </div>
        </div>

        <form class="admin-login-form" id="adminLoginForm">
          <div class="admin-form-group">
            <label for="adminUsernameInput">Username</label>
            <input
              type="text"
              id="adminUsernameInput"
              autocomplete="username"
              placeholder="Username admin"
              required
            >
          </div>

          <div class="admin-form-group">
            <label for="adminPasswordInput">Password</label>
            <input
              type="password"
              id="adminPasswordInput"
              autocomplete="current-password"
              placeholder="Password"
              required
            >
          </div>

          <button type="submit" class="btn-primary">
            Login
          </button>

          <p class="admin-form-note" id="adminLoginMessage"></p>
        </form>
      </div>
    </section>

    <section class="admin-dashboard is-hidden" id="adminDashboard">
      <nav class="admin-navbar">
        <div class="admin-navbar-brand">
          <img
            src="images/logo.jpeg"
            alt="CV Niaga Bersama Abadi"
          >

          <div>
            <strong>Admin NBA</strong>
            <small>Dashboard</small>
          </div>
        </div>

        <div class="admin-navbar-links">
          <a href="index.html" class="admin-nav-link admin-site-link">
            Website
          </a>

          <button
            type="button"
            class="admin-nav-link is-active"
            data-admin-view-target="adminCatalogueView"
          >
            Katalog
          </button>

          <button
            type="button"
            class="admin-nav-link"
            data-admin-view-target="brandsAdminView"
            data-admin-only
          >
            Brand
          </button>

          <button
            type="button"
            class="admin-nav-link"
            data-admin-view-target="adminSalesView"
          >
            Penjualan
          </button>

          <button
            type="button"
            class="admin-nav-link"
            data-admin-view-target="adminServiceView"
          >
            Service
          </button>

          <button
            type="button"
            class="admin-nav-link"
            data-admin-view-target="adminUsersView"
            data-admin-only
          >
            User
          </button>
          
          <button
            type="button"
            class="admin-nav-link"
            data-admin-view-target="adminAuditView"
            data-admin-only
          >
            Aktivitas
          </button>
          <button
  type="button"
  class="admin-nav-link"
  data-admin-view-target="adminReportsView"
>
  Laporan
</button>
          <span class="admin-current-user" id="adminCurrentUserLabel">
            User
          </span>

          <button
            type="button"
            class="admin-nav-link admin-logout-link"
            id="adminLogoutBtn"
          >
            Logout
          </button>
        </div>
      </nav>

      <div id="adminPartialMount">
        <div class="admin-empty-state">
          Memuat admin panel...
        </div>
      </div>
    </section>
  </main>

<script src="js/bike-utils.js"></script>
<script src="js/admin-core.js"></script>
<script src="js/admin-partials.js"></script>
<script src="js/admin-bikes.js"></script>
<script src="js/admin-brands.js"></script>
<script src="js/admin-invoices.js"></script>
<script src="js/admin-services.js"></script>
<script src="js/admin-users.js"></script>
<script src="js/admin-audit.js"></script>
<script src="js/admin-reports.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
