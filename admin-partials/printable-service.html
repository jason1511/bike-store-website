  <div
    class="admin-service-modal is-hidden"
    id="adminServiceModal"
    aria-hidden="true"
  >
    <div
      class="admin-service-modal-overlay"
      id="adminServiceModalOverlay"
    ></div>

    <div class="admin-service-modal-content">
      <div class="admin-service-modal-actions no-print">
        <button
          type="button"
          class="btn-secondary"
          id="closeServiceModalBtn"
        >
          Tutup
        </button>

        <button
          type="button"
          class="btn-primary"
          id="printServiceBtn"
        >
          Cetak Service
        </button>
      </div>

      <article class="printable-service">
        <header class="printable-service-header">
          <div class="printable-service-brand">
            <img
              src="images/logo.jpeg"
              alt="CV Niaga Bersama Abadi"
            >

            <div>
              <h1>CV Niaga Bersama Abadi</h1>
              <p>Showroom Sepeda Listrik</p>
              <p>Lumajang, Jawa Timur</p>
            </div>
          </div>

          <div class="printable-service-title">
            <p>Invoice Service</p>
            <h2 id="printServiceNumber">SRV-0000</h2>
          </div>
        </header>

        <section class="printable-service-meta">
          <div>
            <span>Tanggal</span>
            <strong id="printServiceDate">-</strong>
          </div>

          <div>
            <span>Admin</span>
            <strong id="printServiceCreatedBy">-</strong>
          </div>

          <div>
            <span>Status</span>
            <strong id="printServiceStatus">-</strong>
          </div>
        </section>

        <section class="printable-service-section">
          <h3>Customer</h3>

          <div class="printable-service-customer">
            <div>
              <span>Nama</span>
              <strong id="printServiceCustomerName">-</strong>
            </div>

            <div>
              <span>WhatsApp</span>
              <strong id="printServiceCustomerPhone">-</strong>
            </div>

            <div class="printable-service-wide">
              <span>Alamat</span>
              <strong id="printServiceCustomerAddress">-</strong>
            </div>
          </div>
        </section>

        <section class="printable-service-section">
          <h3>Detail Service</h3>

          <div class="printable-service-table-wrap">
            <table class="printable-service-table">
              <thead>
                <tr>
                  <th>Unit</th>
                  <th>Jenis Service</th>
                  <th>Biaya</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td id="printServiceBikeLabel">-</td>
                  <td id="printServiceType">-</td>
                  <td id="printServiceCost">-</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="printable-service-total-box">
            <span>Total Service</span>
            <strong id="printServiceTotal">Rp 0</strong>
          </div>
        </section>

        <section
          class="printable-service-section"
          id="printServiceNotesSection"
        >
          <h3>Catatan</h3>
          <p id="printServiceNotes">-</p>
        </section>

        <footer class="printable-service-footer">
          <div>
            <p>Customer</p>
            <span></span>
            <strong id="printServiceCustomerSignature">-</strong>
          </div>

          <div>
            <p>Admin / Teknisi</p>
            <span></span>
            <strong id="printServiceStaffSignature">-</strong>
          </div>
        </footer>
      </article>
    </div>
  </div>
